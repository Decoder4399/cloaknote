<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>App — CloakNote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <!-- Compression -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

  <style>
    .editor-wrap { max-width: 800px; margin: 40px auto; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: var(--text-muted); }
    .output-area { margin-top: 40px; display: none; padding-top: 40px; }
    .link-display { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 16px; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; transform: translateY(100px); transition: 0.3s; }
    .toast.show { transform: translateY(0); }
  </style>
</head>

<body>

<canvas id="bg-canvas"></canvas>
<div class="mesh-gradient"></div>

<div class="container animate">
<header style="padding:30px 0; display:flex; justify-content:space-between;">
<a href="index.html" class="logo">🔐 CLOAKNOTE</a>
</header>

<main class="editor-wrap">
<div class="glass-card">

<div class="status-bar">
<div id="counter">0 / 2500</div>
<div id="status-label">Local Encryption Active</div>
</div>

<textarea id="note" rows="10"></textarea>

<div class="grid-stack" style="margin-top:20px;">
<button id="generate">Generate</button>
<button id="clear">Clear</button>
</div>

<div id="output" class="output-area">
<div id="linkBox"></div>
<button id="copyBtn">Copy</button>
<div id="qrContainer"></div>
</div>

</div>
</main>

<footer>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</footer>
</div>

<div id="toast" class="toast">Copied</div>

<script>
const noteEl = document.getElementById("note");
const counterEl = document.getElementById("counter");
const outputEl = document.getElementById("output");
const linkBoxEl = document.getElementById("linkBox");
const qrEl = document.getElementById("qrContainer");

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

noteEl.oninput = () => {
  counterEl.textContent = noteEl.value.length + "/2500";
};

const fp = p => p.slice(0,40);
const burned = f => localStorage.getItem("cloak_"+f)==="1";
const burn = f => localStorage.setItem("cloak_"+f,"1");

async function deriveKey(s){
  const e=new TextEncoder();
  const b=await crypto.subtle.importKey("raw",e.encode(s),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:e.encode("cloaknote"),iterations:100000,hash:"SHA-256"},
    b,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}

async function enc(t,s){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const k=await deriveKey(s);
  const c=LZString.compressToUint8Array(t);
  const d=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,c);
  return btoa(String.fromCharCode(...iv))+"."+btoa(String.fromCharCode(...new Uint8Array(d)));
}

async function dec(p,s){
  const [i,d]=p.split(".");
  const iv=Uint8Array.from(atob(i),c=>c.charCodeAt(0));
  const data=Uint8Array.from(atob(d),c=>c.charCodeAt(0));
  const k=await deriveKey(s);
  const pl=await crypto.subtle.decrypt({name:"AES-GCM",iv},k,data);
  return LZString.decompressFromUint8Array(new Uint8Array(pl));
}

// ===== BACKEND TRACKING =====
async function trackEvent(type){
  try{
    await fetch("http://localhost:5000/api/track",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({event:type})
    });
  }catch(e){}
}

// GENERATE
document.getElementById("generate").onclick = async ()=>{
  const text = noteEl.value.trim();
  if(!text) return showToast("Enter note");

  const s = crypto.randomUUID().slice(0,8);
  const e = await enc(text,s);
  const url = location.origin + location.pathname + "#" + e + ":" + s;

  outputEl.style.display="block";
  linkBoxEl.textContent=url;

  qrEl.innerHTML="";
  QRCode.toCanvas(qrEl,url);

  trackEvent("note_created");
};

// COPY
document.getElementById("copyBtn").onclick = async ()=>{
  await navigator.clipboard.writeText(linkBoxEl.textContent);
  showToast("Copied");
  trackEvent("link_copied");
};

// CLEAR
document.getElementById("clear").onclick = ()=>{
  noteEl.value="";
  outputEl.style.display="none";
};

// VIEW
window.addEventListener("load", async ()=>{
  if(!location.hash.includes(":")) return;

  const [p,s]=location.hash.substring(1).split(":");
  const id=fp(p);

  if(burned(id)){
    noteEl.value="Already opened";
    return;
  }

  try{
    const t=await dec(p,s);
    burn(id);
    noteEl.value=t;
    trackEvent("note_viewed");
  }catch{
    noteEl.value="Invalid";
  }
});
</script>

</body>
</html>
