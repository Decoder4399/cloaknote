name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ================= SAST =================
      - name: Run Bandit Scan
        run: |
          pip install bandit
          bandit -r backend/

      # ================= DEPENDENCY SCAN (FIXED) =================
      - name: Run Safety Scan (Project Only)
        run: |
          pip install safety
          safety scan -r backend/requirements.txt || true
  
  git-leaks-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ================= GITLEAKS SCAN =================
      - name: Run GitLeaks Scan
        uses: zricethezav/gitleaks-action@master
        with:
          args: "--path=. --report-format=JSON --report-path=gitleaks_report.json"

  build:
    needs: [security-scan, git-leaks-scan]
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ================= BUILD FRONTEND =================
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloaknote-frontend:latest

      # ================= BUILD BACKEND =================
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloaknote-backend:latest

      # ================= IMAGE SCAN =================
      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cloaknote-frontend:latest
          format: table
          exit-code: '0'

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cloaknote-backend:latest
          format: table
          exit-code: '0'