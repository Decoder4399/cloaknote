apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloaknote
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: decoder4399/cloaknote-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: mongodb://mongo-service:27017/
            - name: FLASK_DEBUG
              value: "false"
            - name: FLASK_HOST
              value: "0.0.0.0"
